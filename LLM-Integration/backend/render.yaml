services:
  - type: web
    name: rayyan-ai-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11
    disk:
      name: chroma-db
      mountPath: /opt/render/project/src/chroma_db
      sizeGB: 1
